name: CI
on:
  push:
    branches: [master, main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun x tsc --noEmit
      - run: bun test
      - run: bun x vite build
